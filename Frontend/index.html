<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copilot Chat</title>
  </head>
  <body>
    <div id="app">
      <section id="chatShell" aria-label="Copilot chat">
        <div id="chatContainer">
          <div id="chat"></div>

          <div id="inputBar">
            <input id="input" placeholder="Ask about policies, deadlines, rooms, or support..." />
            <button id="contextBtn" type="button">Context</button>
            <button id="sendBtn" type="button">Send</button>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
