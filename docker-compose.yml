services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
